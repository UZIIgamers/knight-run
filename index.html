<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas{position:fixed;top:0;left:0;z-index:1}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,3,16,.93);pointer-events:all}
.hidden{display:none!important}
h1{color:#fff;font-size:clamp(26px,8vw,42px);text-shadow:0 0 20px #aa44ff;margin-bottom:6px}
h2{color:#fff;font-size:20px;margin-bottom:18px}
.btn{margin:5px;padding:12px 30px;border:none;border-radius:8px;font:bold 14px 'Courier New';cursor:pointer;color:#fff;transition:opacity .15s}
.btn:active{opacity:.7}
#hud{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#sb{position:absolute;top:12px;left:14px;color:#fff;font-size:15px;font-weight:bold}
#lbx{position:absolute;top:12px;left:50%;transform:translateX(-50%);color:#bb99ff;font-size:14px}
#pbtn{position:absolute;top:12px;right:14px;color:rgba(255,255,255,.35);font-size:22px;pointer-events:all;cursor:pointer}
#abtn{position:absolute;bottom:26px;right:26px;width:66px;height:66px;border-radius:50%;background:rgba(0,0,0,.75);border:3px solid #aa88ff;color:#fff;font:bold 9px 'Courier New';display:flex;align-items:center;justify-content:center;pointer-events:all;cursor:pointer;text-align:center;flex-direction:column;gap:2px}
#bst{position:absolute;bottom:10px;left:14px;color:#334;font-size:11px}
p.hint{color:#33334a;font-size:11px;margin-top:16px;text-align:center;padding:0 20px}
</style>
<div id="ui">
  <div id="hud" class="hidden">
    <div id="sb">SCORE: <span id="sv">0</span><br><span style="color:#ffdd00;font-size:12px">GOLD: <span id="gv">0</span></span></div>
    <div id="lbx">LV <span id="lv">1</span></div>
    <div id="pbtn" onclick="togglePause()">⏸</div>
    <div id="abtn" onclick="doAbility()"><span id="albl">SLASH</span><span id="acd" style="font-size:8px;color:#aaa"></span></div>
    <div id="bst">BEST: <span id="bv">0</span></div>
  </div>
  <div id="ms" class="screen">
    <h1>KNIGHT RUN 3D</h1>
    <p style="color:#7766aa;font-size:12px;margin-bottom:22px">Medieval 3D Endless Runner</p>
    <button class="btn" style="background:#cc2222;width:190px" onclick="startGame()">▶  PLAY NOW</button>
    <button class="btn" style="background:#2244aa;width:190px" onclick="showChar()">⚔  CHARACTERS</button>
    <button class="btn" style="background:#225522;width:190px" id="sndbtn" onclick="toggleSnd()">🔊  SOUND ON</button>
    <p class="hint">Swipe ← → lanes • Tap to JUMP • Tap button to ATTACK</p>
  </div>
  <div id="cs" class="screen hidden">
    <h2>CHOOSE YOUR HERO</h2>
    <button class="btn" style="width:240px" id="cb0" onclick="selChar=0;upCharUI()">🔴 Red Knight — SLASH</button>
    <button class="btn" style="width:240px" id="cb1" onclick="selChar=1;upCharUI()">🟢 Green Archer — SHOOT</button>
    <button class="btn" style="width:240px" id="cb2" onclick="selChar=2;upCharUI()">🔵 Blue Wizard — SHIELD</button>
    <div id="cdesc" style="color:#aaaaff;font-size:12px;margin:14px;text-align:center;max-width:260px"></div>
    <button class="btn" style="background:#333366" onclick="showMenu()">← BACK</button>
  </div>
  <div id="os" class="screen hidden">
    <h1 style="color:#ff4444;text-shadow:0 0 20px #ff0000">GAME OVER</h1>
    <div id="ofs" style="color:#ffdd00;font-size:20px;margin:10px 0 3px"></div>
    <div id="ofg" style="color:#ffcc00;font-size:15px;margin-bottom:5px"></div>
    <div id="ofb" style="color:#aa88ff;font-size:14px;margin-bottom:22px"></div>
    <button class="btn" style="background:#cc2222;width:190px" onclick="startGame()">▶ PLAY AGAIN</button>
    <button class="btn" style="background:#332244;width:190px" onclick="showMenu()">🏠 MAIN MENU</button>
  </div>
  <div id="ps" class="screen hidden">
    <h2>PAUSED</h2>
    <button class="btn" style="background:#334422;width:190px" onclick="resumeGame()">▶ RESUME</button>
    <button class="btn" style="background:#332244;width:190px" onclick="showMenu()">🏠 MAIN MENU</button>
  </div>
</div>

<script>
const W=window.innerWidth,H=window.innerHeight;

// Renderer
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Scene
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x040210);
scene.fog=new THREE.Fog(0x040210,20,58);

// Camera
const camera=new THREE.PerspectiveCamera(65,W/H,0.1,100);
camera.position.set(0,5,-7);camera.lookAt(0,0,8);

// Lights
scene.add(new THREE.AmbientLight(0x404070,0.7));
const sun=new THREE.DirectionalLight(0xffeedd,1.3);
sun.position.set(6,14,2);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-14;sun.shadow.camera.right=14;
sun.shadow.camera.top=12;sun.shadow.camera.bottom=-4;
scene.add(sun);
const fill=new THREE.DirectionalLight(0x4444aa,0.4);fill.position.set(-5,5,-5);scene.add(fill);

// Torch lights
const torches=[];
for(let i=0;i<6;i++){
  const pl=new THREE.PointLight(i%2===0?0xff6600:0xff4400,1.8,7);
  pl.position.set(i%2===0?-6:6,2.5,i*8-10);
  scene.add(pl);torches.push(pl);
}

// Stars
const sg=new THREE.BufferGeometry();
const sv=[];for(let i=0;i<1200;i++)sv.push((Math.random()-.5)*200,Math.random()*40+5,(Math.random()-.5)*200);
sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.12})));

// ===== MATERIALS =====
const M={
  road:new THREE.MeshPhongMaterial({color:0x2a1848,shininess:20}),
  road2:new THREE.MeshPhongMaterial({color:0x221340,shininess:20}),
  stone:new THREE.MeshPhongMaterial({color:0x7a6a55,shininess:10}),
  stoneD:new THREE.MeshPhongMaterial({color:0x554433}),
  barrel:new THREE.MeshPhongMaterial({color:0x8B4513,shininess:30}),
  ring:new THREE.MeshPhongMaterial({color:0x5c2d0a,shininess:60}),
  coin:new THREE.MeshPhongMaterial({color:0xffdd00,shininess:120,emissive:0x332200}),
  skin:new THREE.MeshPhongMaterial({color:0xffcc88,shininess:40}),
  shoe:new THREE.MeshPhongMaterial({color:0x442200,shininess:30}),
  eye:new THREE.MeshPhongMaterial({color:0xffffff}),
  pupil:new THREE.MeshPhongMaterial({color:0x111133}),
  nose:new THREE.MeshPhongMaterial({color:0xee9966}),
  moustache:new THREE.MeshPhongMaterial({color:0x331100}),
  sword:new THREE.MeshPhongMaterial({color:0xccddff,shininess:150}),
  guard:new THREE.MeshPhongMaterial({color:0xcc8844,shininess:80}),
  bow:new THREE.MeshPhongMaterial({color:0x886644,shininess:30}),
  staff:new THREE.MeshPhongMaterial({color:0x664422,shininess:20}),
  fire1:new THREE.MeshPhongMaterial({color:0xff6600,emissive:0xff3300,emissiveIntensity:0.8,transparent:true,opacity:0.88}),
  fire2:new THREE.MeshPhongMaterial({color:0xffee00,emissive:0xffaa00,emissiveIntensity:1,transparent:true,opacity:0.85}),
  fireBase:new THREE.MeshPhongMaterial({color:0x222222}),
  enemy:new THREE.MeshPhongMaterial({color:0x228822,shininess:30}),
  enemyCap:new THREE.MeshPhongMaterial({color:0x553311,shininess:10}),
  eyeR:new THREE.MeshPhongMaterial({color:0xff2222}),
  cBody:[
    new THREE.MeshPhongMaterial({color:0xcc2222,shininess:40}),
    new THREE.MeshPhongMaterial({color:0x228833,shininess:40}),
    new THREE.MeshPhongMaterial({color:0x2244cc,shininess:40}),
  ],
  cPants:[
    new THREE.MeshPhongMaterial({color:0x2244cc,shininess:30}),
    new THREE.MeshPhongMaterial({color:0x226622,shininess:30}),
    new THREE.MeshPhongMaterial({color:0x441188,shininess:30}),
  ],
  shield3d:new THREE.MeshPhongMaterial({color:0xaa44ff,transparent:true,opacity:0.22,emissive:0x440088,emissiveIntensity:0.6,shininess:80}),
  orb:new THREE.MeshPhongMaterial({color:0xaa44ff,emissive:0x440088,emissiveIntensity:0.6,shininess:100}),
  arrowM:new THREE.MeshPhongMaterial({color:0xaaaa44,shininess:50}),
};

// ===== GAME STATE =====
let gState='menu',paused=false,fr=0;
let score=0,gold=0,hi=0,lv=1,spd=0.16;
let selChar=0,soundOn=true,musicOn=true;
let bgmT=null,melIdx=0;
const MELODY=[261,329,392,523,440,392,329,261,294,349,440,392];

const LANES=[-2,0,2];
let pl={lane:1,tl:1,lt:1,y:0,vy:0,jumping:false,inv:false,inT:0,shield:false,shT:0,wcd:0};

// ===== TRACK =====
const TILE_D=12;
let tiles=[],walls=[];
let tIdx=0;

function mkTile(z,i){
  const g=new THREE.Group();
  const floor=new THREE.Mesh(new THREE.BoxGeometry(8,0.3,TILE_D),i%2===0?M.road:M.road2);
  floor.receiveShadow=true;g.add(floor);
  // Lane lines
  [-1,1].forEach(x=>{
    const l=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.02,TILE_D),new THREE.MeshPhongMaterial({color:0xffffff,transparent:true,opacity:0.12}));
    l.position.set(x,0.16,0);g.add(l);
  });
  g.position.set(0,0,z);scene.add(g);return g;
}

function mkWallSection(z){
  const g=new THREE.Group();
  [-5,5].forEach((x,si)=>{
    const w=new THREE.Mesh(new THREE.BoxGeometry(1.6,5,TILE_D),M.stoneD);
    w.position.set(x,2.5,0);w.castShadow=true;w.receiveShadow=true;g.add(w);
    // Pillar at start
    const p=new THREE.Mesh(new THREE.BoxGeometry(0.7,6,0.7),M.stone);
    p.position.set(x,3,-TILE_D/2);p.castShadow=true;g.add(p);
    // Torch mount
    const tm=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.12,0.4,8),new THREE.MeshPhongMaterial({color:0x886644}));
    tm.position.set(x+(si===0?0.5:-0.5),2.3,0);g.add(tm);
  });
  g.position.set(0,0,z);scene.add(g);return g;
}

function initTrack(){
  tiles.forEach(t=>scene.remove(t));tiles=[];
  walls.forEach(w=>scene.remove(w));walls=[];
  for(let i=0;i<6;i++)tiles.push(mkTile(i*TILE_D-10,tIdx++));
  for(let i=0;i<4;i++)walls.push(mkWallSection(i*TILE_D-4));
}

function updateTrack(){
  tiles.forEach(t=>t.position.z-=spd);
  walls.forEach(w=>w.position.z-=spd);
  if(tiles[0].position.z<-TILE_D*2){let t=tiles.shift();t.position.z=tiles[tiles.length-1].position.z+TILE_D;tiles.push(t);}
  if(walls[0].position.z<-TILE_D*2){let w=walls.shift();w.position.z=walls[walls.length-1].position.z+TILE_D;walls.push(w);}
}

// ===== PLAYER MODEL =====
let pGroup=null,pParts={};

function buildPlayer(){
  if(pGroup)scene.remove(pGroup);
  pGroup=new THREE.Group();pParts={};
  const c=selChar,bm=M.cBody[c],pm=M.cPants[c];

  // Shoes
  const sg2=new THREE.BoxGeometry(0.36,0.2,0.46);
  const ls=new THREE.Mesh(sg2,M.shoe);ls.position.set(-0.22,-0.62,0.05);ls.castShadow=true;
  const rs=new THREE.Mesh(sg2,M.shoe);rs.position.set(0.22,-0.62,0.05);rs.castShadow=true;
  pGroup.add(ls,rs);pParts.ls=ls;pParts.rs=rs;

  // Legs
  const lg=new THREE.BoxGeometry(0.32,0.55,0.3);
  const ll=new THREE.Mesh(lg,pm);ll.position.set(-0.22,-0.28,0);ll.castShadow=true;
  const rl=new THREE.Mesh(lg,pm);rl.position.set(0.22,-0.28,0);rl.castShadow=true;
  pGroup.add(ll,rl);pParts.ll=ll;pParts.rl=rl;

  // Body
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.88,0.88,0.55),bm);
  body.position.set(0,0.24,0);body.castShadow=true;pGroup.add(body);
  // Bib
  const bib=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.88,0.02),pm);bib.position.set(0,0.24,0.28);pGroup.add(bib);
  // Buttons
  [-0.1,0.1].forEach(y=>{const b=new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6),new THREE.MeshPhongMaterial({color:0xffee88}));b.position.set(0,0.24+y,0.3);pGroup.add(b);});

  // Arms
  const ag=new THREE.BoxGeometry(0.28,0.65,0.28);
  const la=new THREE.Mesh(ag,bm);la.position.set(-0.6,0.1,0);la.castShadow=true;
  const ra=new THREE.Mesh(ag,bm);ra.position.set(0.6,0.1,0);ra.castShadow=true;
  pGroup.add(la,ra);pParts.la=la;pParts.ra=ra;

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.44,16,12),M.skin);
  head.position.set(0,1,0);head.castShadow=true;pGroup.add(head);
  // Ears
  [-0.44,0.44].forEach(x=>{const e=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),M.skin);e.position.set(x,1,0);pGroup.add(e);});
  // Eyes
  [-0.18,0.18].forEach(x=>{
    const ew=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8),M.eye);ew.position.set(x,1.04,0.37);
    const ep=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),M.pupil);ep.position.set(x,1.04,0.43);
    const eh=new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),new THREE.MeshPhongMaterial({color:0xffffff}));eh.position.set(x-.03,1.07,0.46);
    pGroup.add(ew,ep,eh);
  });
  // Nose
  const nose=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8),M.nose);nose.position.set(0,0.94,0.44);pGroup.add(nose);
  // Moustache
  [-0.14,0.14].forEach(x=>{const m=new THREE.Mesh(new THREE.SphereGeometry(0.11,8,6),M.moustache);m.scale.set(1.2,0.7,0.8);m.position.set(x,0.86,0.4);pGroup.add(m);});

  // Hat
  const brimG=new THREE.CylinderGeometry(0.56,0.56,0.1,16);
  const brim=new THREE.Mesh(brimG,bm);brim.position.set(0,1.38,0);pGroup.add(brim);
  if(c===2){
    const cone=new THREE.Mesh(new THREE.ConeGeometry(0.42,0.95,16),bm);cone.position.set(0,1.85,0);pGroup.add(cone);
    // Stars on hat
    [0,1,2].forEach(i=>{const star=new THREE.Mesh(new THREE.SphereGeometry(0.055,6,6),new THREE.MeshPhongMaterial({color:0xffdd00,emissive:0x443300}));star.position.set(Math.sin(i*2.1)*0.2,1.6+i*.18,Math.cos(i*2.1)*0.2);pGroup.add(star);});
  } else {
    const top=new THREE.Mesh(new THREE.CylinderGeometry(0.36,0.4,0.5,16),bm);top.position.set(0,1.65,0);pGroup.add(top);
    // Label on hat
    const lbl=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.18,0.02),new THREE.MeshPhongMaterial({color:0xffffff}));lbl.position.set(0,1.65,0.37);pGroup.add(lbl);
  }

  // Weapon
  if(c===0){
    const sw=new THREE.Mesh(new THREE.BoxGeometry(0.09,0.95,0.06),M.sword);sw.position.set(0.88,0.55,0);sw.castShadow=true;
    const gd=new THREE.Mesh(new THREE.BoxGeometry(0.38,0.09,0.06),M.guard);gd.position.set(0.88,0.22,0);
    const tip=new THREE.Mesh(new THREE.SphereGeometry(0.07,8,8),new THREE.MeshPhongMaterial({color:0xffdd88}));tip.position.set(0.88,1.03,0);
    pGroup.add(sw,gd,tip);pParts.sw=sw;
  } else if(c===1){
    const bow=new THREE.Mesh(new THREE.TorusGeometry(0.36,0.045,8,16,Math.PI),M.bow);
    bow.position.set(0.88,0.5,0);bow.rotation.z=-Math.PI/2;
    const str=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.72,6),new THREE.MeshPhongMaterial({color:0xddcc88}));
    str.position.set(0.88,0.5,0);
    pGroup.add(bow,str);
  } else {
    const stf=new THREE.Mesh(new THREE.CylinderGeometry(0.065,0.065,1.15,8),M.staff);stf.position.set(0.88,0.5,0);
    const orb=new THREE.Mesh(new THREE.SphereGeometry(0.22,12,12),M.orb);orb.position.set(0.88,1.13,0);
    pGroup.add(stf,orb);pParts.orb=orb;
  }

  pGroup.position.set(LANES[1],0,0);
  scene.add(pGroup);
}
