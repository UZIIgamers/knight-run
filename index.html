<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;}
canvas{display:block;touch-action:none;}
</style>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
cv.width=window.innerWidth;cv.height=window.innerHeight;
const W=cv.width,H=cv.height;

// ===== AUDIO =====
let actx=null,soundOn=true,musicOn=true,bgmTimer=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function beep(freq,dur,type='sine',vol=0.25,delay=0){
  if(!actx||!soundOn)return;
  let o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,actx.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+delay+dur);
  o.start(actx.currentTime+delay);o.stop(actx.currentTime+delay+dur);
}
function noise(dur,vol=0.2){
  if(!actx||!soundOn)return;
  let b=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  let s=actx.createBufferSource(),g=actx.createGain();
  s.buffer=b;s.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  s.start();s.stop(actx.currentTime+dur);
}
function sndJump(){beep(280,0.08,'sine',0.2);beep(480,0.1,'sine',0.15,0.07);}
function sndCoin(){beep(880,0.05,'sine',0.2);beep(1320,0.08,'sine',0.12,0.04);}
function sndHit(){noise(0.15,0.3);beep(80,0.2,'sawtooth',0.2);}
function sndSlash(){noise(0.07,0.25);beep(350,0.04,'square',0.12);}
function sndShoot(){beep(550,0.04,'sawtooth',0.15);beep(280,0.07,'sawtooth',0.1,0.04);}
function sndMagic(){beep(400,0.25,'sine',0.18,0);beep(700,0.2,'sine',0.12,0.1);beep(1000,0.15,'sine',0.08,0.2);}
function sndDie(){beep(180,0.3,'sawtooth',0.3);beep(100,0.4,'sawtooth',0.2,0.25);}
function sndGoblin(){beep(300,0.05,'square',0.1);beep(200,0.05,'square',0.08,0.05);}

const MELODY=[261,329,392,329,261,294,349,294,349,440,392,349,261,294,329,261];
let melIdx=0;
function startBGM(){
  if(bgmTimer)return;
  bgmTimer=setInterval(()=>{
    if(!musicOn||!actx)return;
    let n=MELODY[melIdx%MELODY.length];
    beep(n,0.22,'triangle',0.04);beep(n/2,0.22,'sine',0.03);
    melIdx++;
  },320);
}
function stopBGM(){clearInterval(bgmTimer);bgmTimer=null;}

// ===== PERSPECTIVE =====
const VPX=W/2,VPY=H*0.30,BOT_Y=H*0.88;
const LANE_BOT=[W*0.18,W*0.5,W*0.82];
const LANE_HOR=[W*0.43,W*0.5,W*0.57];
function lp(lane,z){
  let x=LANE_HOR[lane]+(LANE_BOT[lane]-LANE_HOR[lane])*z;
  let y=VPY+(BOT_Y-VPY)*z;
  return{x,y,sc:0.08+z*0.92};
}
function lpf(lf,z){
  let hx=LANE_HOR[0]+(LANE_HOR[2]-LANE_HOR[0])*(lf/2);
  let bx=LANE_BOT[0]+(LANE_BOT[2]-LANE_BOT[0])*(lf/2);
  return{x:hx+(bx-hx)*z,y:VPY+(BOT_Y-VPY)*z};
}
let stripes=Array.from({length:12},(_,i)=>i/12);

// ===== CHARACTERS =====
const CHARS=[
  {name:'Knight',desc:'Sword Slash nearby enemies',color:'#aaaacc',cape:'#aa2222',wCol:'#ccccdd',cdMax:55},
  {name:'Archer',desc:'Arrow shoots ahead',color:'#aacc88',cape:'#225522',wCol:'#886644',cdMax:40},
  {name:'Wizard',desc:'Magic shield protection',color:'#cc88ff',cape:'#442266',wCol:'#aa44ff',cdMax:35},
];

// ===== THEMES =====
const THEMES=[
  {name:'Castle',road:'#2d1a4a',sky:'#0a0520',fog:'#3d2a5a',stripe:'rgba(120,70,200,0.4)',edge:'#554433'},
  {name:'Forest',road:'#1a2a1a',sky:'#050f05',fog:'#2a4a2a',stripe:'rgba(50,160,50,0.4)',edge:'#335533'},
  {name:'Volcano',road:'#2a1200',sky:'#0f0300',fog:'#5a2a0a',stripe:'rgba(220,80,20,0.5)',edge:'#553322'},
  {name:'Ice Cave',road:'#1a2a3a',sky:'#050a10',fog:'#2a4a5a',stripe:'rgba(100,180,255,0.4)',edge:'#334455'},
];

// ===== STATE =====
let state='menu',fr=0;
let score=0,coins=0,hi=0,lv=1,spd=0.007;
let objs=[],sparks=[],spawnT=70,wcd=0;
let selChar=0,selTheme=0;
let pl={lane:1,tl:1,lt:1,jz:0,jv:0,jumping:false,inv:false,inT:0,shield:false,shT:0,fxT:0,fx:''};

// ===== HELPERS =====
function spark(x,y,col,n){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,s=1+Math.random()*4;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:25+~~(Math.random()*20),ml:45,r:2+Math.random()*3,c:col});
  }
}
function inB(b,x,y){return b&&x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h;}
function rnd(a,b){return a+Math.random()*(b-a);}
function btn(label,x,y,w,h,bg='#4433aa'){
  cx.fillStyle=bg;
  cx.beginPath();
  if(cx.roundRect)cx.roundRect(x-w/2,y-h/2,w,h,10);
  else cx.rect(x-w/2,y-h/2,w,h);
  cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.2)';cx.lineWidth=1;cx.stroke();
  cx.fillStyle='#fff';cx.font='bold 15px Courier New';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(label,x,y);cx.textBaseline='alphabetic';
  return{x:x-w/2,y:y-h/2,w,h};
}

// ===== SPAWNING =====
function spawnWave(){
  let r=Math.random();
  if(r<0.28){
    let lane=~~(Math.random()*3);
    for(let i=0;i<4;i++)objs.push({type:'coin',lane,z:-i*.13,col:false});
  } else if(r<0.48){
    objs.push({type:Math.random()<0.5?'barrel':'fire',lane:~~(Math.random()*3),z:0});
  } else if(r<0.68){
    let free=~~(Math.random()*3);
    for(let i=0;i<3;i++)if(i!==free)objs.push({type:'wall',lane:i,z:0});
  } else {
    // Goblin enemy
    objs.push({type:'enemy',lane:~~(Math.random()*3),z:0,hp:1,dead:false});
    sndGoblin();
  }
}

// ===== ABILITY =====
function useAbility(){
  if(wcd>0||state!=='play')return;
  let ch=CHARS[selChar];wcd=ch.cdMax;pl.fx=selChar;pl.fxT=22;
  if(selChar===0){
    sndSlash();
    objs.forEach(o=>{if(o.type==='enemy'&&!o.dead&&o.z>0.65&&Math.abs(o.lane-pl.tl)<=1){
      o.dead=true;let p=lp(o.lane,o.z);spark(p.x,p.y,'#ffaa00',12);score+=20;
    }});
  } else if(selChar===1){
    sndShoot();
    objs.push({type:'arrow',lane:pl.tl,z:1,spd:0.05,col:false});
  } else {
    sndMagic();pl.shield=true;pl.shT=240;spark(W/2,BOT_Y,'#aa44ff',18);
  }
}

// ===== JUMP / LANE =====
function jump(){
  if(!pl.jumping&&state==='play'){pl.jumping=true;pl.jv=0.042;sndJump();}
}
function swLane(d){
  if(state!=='play')return;
  let n=pl.tl+d;
  if(n>=0&&n<=2){pl.lane=pl.tl;pl.tl=n;pl.lt=0;}
}

// ===== RESET =====
function startGame(){
  state='play';score=0;coins=0;lv=1;fr=0;spd=0.007;
  pl={lane:1,tl:1,lt:1,jz:0,jv:0,jumping:false,inv:false,inT:0,shield:false,shT:0,fxT:0,fx:''};
  objs=[];sparks=[];spawnT=70;wcd=0;
  initAudio();startBGM();
}

// ===== UPDATE =====
function update(){
  fr++;stripes=stripes.map(s=>(s+spd)%1);
  if(state!=='play')return;
  lv=1+~~(score/450);spd=0.007+lv*.0008;
  if(wcd>0)wcd--;if(pl.fxT>0)pl.fxT--;
  if(pl.lt<1)pl.lt=Math.min(1,pl.lt+0.13);
  if(pl.jumping){pl.jv-=0.0022;pl.jz+=pl.jv;if(pl.jz<=0){pl.jz=0;pl.jumping=false;pl.jv=0;}}
  if(pl.inv){pl.inT--;if(pl.inT<=0)pl.inv=false;}
  if(pl.shield){pl.shT--;if(pl.shT<=0)pl.shield=false;}

  objs.forEach(o=>{o.type==='arrow'?o.z-=o.spd:o.z+=spd;});
  objs=objs.filter(o=>o.z<1.3&&o.z>-0.1&&!o.col&&!o.dead);
  spawnT--;if(spawnT<=0){spawnWave();spawnT=Math.max(26,80-lv*5);}

  // Arrow hits enemy
  objs.filter(o=>o.type==='arrow').forEach(arr=>{
    objs.filter(o=>o.type==='enemy'&&!o.dead).forEach(e=>{
      if(e.lane===arr.lane&&Math.abs(e.z-arr.z)<0.12){
        e.dead=true;arr.col=true;let p=lp(e.lane,e.z);spark(p.x,p.y,'#88ff44',10);score+=20;
      }
    });
  });

  let pL=pl.lane+(pl.tl-pl.lane)*pl.lt;
  objs.forEach(o=>{
    if(o.z>0.88&&o.z<1.1&&Math.abs(o.lane-pL)<0.52){
      if(o.type==='coin'){coins++;score+=5;sndCoin();let p=lp(o.lane,o.z);spark(p.x,p.y-20*p.sc,'#ffdd00',5);o.col=true;}
      else if(o.type==='enemy'&&!o.dead){
        if(pl.jz>0.14){o.dead=true;score+=20;pl.jv=0.025;let p=lp(o.lane,o.z);spark(p.x,p.y,'#44ff44',10);}
        else if(!pl.inv){hitPlayer(o);}
      } else if(o.type!=='coin'&&o.type!=='arrow'&&!pl.inv){
        if(pl.jz>0.12&&(o.type==='barrel'||o.type==='fire'))return;
        hitPlayer(o);
      }
    }
  });
  if(fr%18===0)score++;
  sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vx*=.92;s.vy*=.92;s.l--;});
  sparks=sparks.filter(s=>s.l>0);
}

function hitPlayer(o){
  if(pl.shield){pl.shield=false;pl.shT=0;o.col=true;spark(W/2,BOT_Y,'#aa44ff',14);}
  else{state='over';hi=Math.max(hi,score);sndDie();stopBGM();}
}

// ===== DRAW ROAD =====
function drawRoad(){
  let t=THEMES[selTheme];
  cx.fillStyle=t.sky;cx.fillRect(0,0,W,VPY+30);
  let fg=cx.createLinearGradient(0,VPY,0,VPY+65);
  fg.addColorStop(0,t.fog+'dd');fg.addColorStop(1,'transparent');
  cx.fillStyle=fg;cx.fillRect(0,VPY,W,65);
  cx.beginPath();cx.moveTo(LANE_HOR[0]-15,VPY);cx.lineTo(LANE_HOR[2]+15,VPY);
  cx.lineTo(LANE_BOT[2]+50,BOT_Y+20);cx.lineTo(LANE_BOT[0]-50,BOT_Y+20);cx.closePath();
  cx.fillStyle=t.road;cx.fill();
  stripes.forEach(z=>{
    if(z<0.05)return;
    let y=VPY+(BOT_Y-VPY)*z;
    let llx=LANE_HOR[0]-15+(LANE_BOT[0]-50-(LANE_HOR[0]-15))*z;
    let rrx=LANE_HOR[2]+15+(LANE_BOT[2]+50-(LANE_HOR[2]+15))*z;
    cx.strokeStyle=t.stripe;cx.lineWidth=2*z;
    cx.beginPath();cx.moveTo(llx,y);cx.lineTo(rrx,y);cx.stroke();
  });
  [0.5,1.5].forEach(lf=>{
    cx.strokeStyle='rgba(255,255,255,0.1)';cx.lineWidth=1;cx.setLineDash([10,16]);
    let p0=lpf(lf,0.05),p1=lpf(lf,1);
    cx.beginPath();cx.moveTo(p0.x,p0.y);cx.lineTo(p1.x,p1.y);cx.stroke();cx.setLineDash([]);
  });
  for(let s=0;s<2;s++){
    let x0=s?LANE_BOT[2]+50:LANE_BOT[0]-50;
    let x1=s?LANE_HOR[2]+15:LANE_HOR[0]-15;
    cx.beginPath();cx.moveTo(x0,BOT_Y+20);cx.lineTo(x1,VPY);
    cx.lineTo(x1+(s?20:-20),VPY);cx.lineTo(x0+(s?30:-30),BOT_Y+20);
    cx.closePath();cx.fillStyle=t.edge;cx.fill();
  }
}

// ===== DRAW OBJECTS =====
function drawBarrel(o){
  let p=lp(o.lane,o.z),s=p.sc;cx.save();cx.translate(p.x,p.y);
  let w=32*s,h=40*s;
  cx.fillStyle='#8B4513';cx.fillRect(-w/2,-h,w,h);
  cx.strokeStyle='#3d1f00';cx.lineWidth=2*s;cx.strokeRect(-w/2,-h,w,h);
  [0.35,0.65].forEach(r=>{cx.fillStyle='#5c2d0a';cx.fillRect(-w/2,-h*r,w,3*s);});
  cx.restore();
}
function drawFire(o){
  let p=lp(o.lane,o.z),s=p.sc;cx.save();cx.translate(p.x,p.y);
  let fw=26*s,fh=46*s;
  cx.fillStyle='#222';cx.fillRect(-fw/2,-3*s,fw,3*s);
  cx.beginPath();cx.moveTo(0,-fh);cx.bezierCurveTo(fw,-fh*.7,fw*.8,-fh*.2,0,0);
  cx.bezierCurveTo(-fw*.8,-fh*.2,-fw,-fh*.7,0,-fh);
  cx.fillStyle=`rgba(255,${70+Math.sin(fr*.3)*40},0,0.92)`;cx.fill();
  cx.beginPath();cx.moveTo(0,-fh*.6);cx.bezierCurveTo(fw*.4,-fh*.5,fw*.3,-fh*.15,0,0);
  cx.bezierCurveTo(-fw*.3,-fh*.15,-fw*.4,-fh*.5,0,-fh*.6);
  cx.fillStyle='rgba(255,215,0,0.9)';cx.fill();
  cx.restore();
}
function drawWall(o){
  let p=lp(o.lane,o.z),s=p.sc;cx.save();cx.translate(p.x,p.y);
  let ww=82*s,wh=74*s;
  cx.fillStyle='#7a6a55';cx.fillRect(-ww/2,-wh,ww,wh);
  for(let r=0;r<4;r++)for(let c=0;c<3;c++){
    cx.strokeStyle='#554433';cx.lineWidth=s;
    cx.fillStyle=r%2===c%2?'#7a6a55':'#6a5a45';
    let bx=-ww/2+c*(ww/3)+(r%2?ww/6:0),by=-wh+r*(wh/4);
    cx.fillRect(bx+s,by+s,ww/3-2*s,wh/4-2*s);cx.strokeRect(bx,by,ww/3,wh/4);
  }
  for(let i=0;i<3;i++)cx.fillRect(-ww/2+i*(ww/3),-wh-11*s,ww/3-4*s,13*s);
  cx.restore();
}
function drawCoin(o){
  let p=lp(o.lane,o.z),s=p.sc;cx.save();cx.translate(p.x,p.y-24*s);
  cx.beginPath();cx.arc(0,0,9*s,0,Math.PI*2);cx.fillStyle='#ffdd00';cx.fill();
  cx.strokeStyle='#cc8800';cx.lineWidth=2*s;cx.stroke();
  cx.fillStyle='#cc8800';cx.font=`bold ${9*s}px Arial`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText('G',0,0);
  cx.restore();
}
function drawGoblin(o){
  if(o.dead)return;
  let p=lp(o.lane,o.z),s=p.sc;cx.save();cx.translate(p.x,p.y);
  let sc=s*.75;
  cx.fillStyle='#228822';cx.fillRect(-10*sc,-30*sc,20*sc,25*sc);
  cx.fillStyle='#33aa33';cx.beginPath();cx.arc(0,-37*sc,10*sc,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ff2222';
  cx.beginPath();cx.arc(-4*sc,-38*sc,2.5*sc,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(4*sc,-38*sc,2.5*sc,0,Math.PI*2);cx.fill();
  cx.fillStyle='#33aa33';
  cx.beginPath();cx.moveTo(-10*sc,-40*sc);cx.lineTo(-15*sc,-50*sc);cx.lineTo(-6*sc,-38*sc);cx.fill();
  cx.beginPath();cx.moveTo(10*sc,-40*sc);cx.lineTo(15*sc,-50*sc);cx.lineTo(6*sc,-38*sc);cx.fill();
  let cs=Math.sin(fr*.2)*5*sc;
  cx.fillStyle='#885533';cx.fillRect((10+cs)*sc,-42*sc,5*sc,26*sc);
  cx.fillStyle='#664422';cx.beginPath();cx.arc((12+cs)*sc,-43*sc,7*sc,0,Math.PI*2);cx.fill();
  cx.fillStyle='#116611';cx.fillRect(-8*sc,-5*sc,7*sc,15*sc);cx.fillRect(1*sc,-5*sc,7*sc,15*sc);
  cx.restore();
}
function drawArrow(o){
  let p=lp(o.lane,o.z),s=p.sc;cx.save();cx.translate(p.x,p.y-22*s);
  cx.fillStyle='#888844';cx.fillRect(-2*s,-14*s,4*s,14*s);
  cx.fillStyle='#cc4444';cx.beginPath();cx.moveTo(0,-20*s);cx.lineTo(-5*s,-12*s);cx.lineTo(5*s,-12*s);cx.fill();
  cx.restore();
}

function drawKnight(){
  let pL=pl.lane+(pl.tl-pl.lane)*pl.lt;
  let x=LANE_BOT[0]+(LANE_BOT[2]-LANE_BOT[0])*(pL/2);
  let y=BOT_Y-pl.jz*H*0.55;
  let ch=CHARS[selChar];
  if(pl.inv&&Math.floor(fr/5)%2===0)return;
  cx.save();cx.translate(x,y);
  // Shadow
  cx.save();cx.scale(1,0.3);cx.beginPath();cx.arc(0,8,18,0,Math.PI*2);
  cx.fillStyle=`rgba(0,0,0,${0.5-pl.jz*0.5})`;cx.fill();cx.restore();
  let ls=Math.sin(fr*.24)*8*(pl.jumping?0:1);
  // Legs
  cx.fillStyle='#7a7a99';
  cx.save();cx.translate(-8,0);cx.rotate(ls*Math.PI/180);cx.fillRect(-5,0,10,28);cx.restore();
  cx.save();cx.translate(8,0);cx.rotate(-ls*Math.PI/180);cx.fillRect(-5,0,10,28);cx.restore();
  cx.fillStyle='#443322';cx.fillRect(-14,22,12,8);cx.fillRect(2,22,12,8);
  // Body
  cx.fillStyle=ch.color;cx.fillRect(-15,-38,30,40);
  cx.fillStyle='#8888aa';cx.fillRect(-15,-38,30,6);
  cx.fillStyle='#5566aa';cx.fillRect(-5,-32,10,18);
  cx.fillStyle='#ccccdd';cx.beginPath();cx.arc(-15,-30,8,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(15,-30,8,0,Math.PI*2);cx.fill();
  cx.fillStyle=ch.cape;cx.beginPath();cx.moveTo(-14,-35);cx.lineTo(-23,12);cx.lineTo(-10,5);cx.fill();
  // Helmet
  cx.fillStyle=ch.color;cx.beginPath();cx.arc(0,-48,14,Math.PI,0);cx.fill();cx.fillRect(-14,-48,28,14);
  cx.fillStyle='#1a1a33';cx.fillRect(-9,-52,18,7);
  cx.fillStyle='#dd2222';cx.beginPath();cx.moveTo(0,-63);cx.lineTo(-6,-49);cx.lineTo(6,-49);cx.fill();
  // Weapon arm
  let as=Math.sin(fr*.24)*10*(pl.jumping?0:1);
  cx.save();cx.translate(18,-30);cx.rotate(as*Math.PI/180);
  if(selChar===0){cx.fillStyle='#ccccdd';cx.fillRect(-2,-42,5,52);cx.fillStyle='#886644';cx.fillRect(-8,-11,18,5);cx.fillStyle='#ffdd88';cx.beginPath();cx.arc(0,-42,4,0,Math.PI*2);cx.fill();}
  else if(selChar===1){cx.strokeStyle='#886644';cx.lineWidth=3;cx.beginPath();cx.arc(0,0,20,Math.PI*.7,Math.PI*1.3);cx.stroke();cx.strokeStyle='#ccaa44';cx.lineWidth=1;cx.beginPath();cx.moveTo(0,-18);cx.lineTo(0,18);cx.stroke();}
  else{cx.fillStyle='#664422';cx.fillRect(-2,-46,5,56);cx.fillStyle=`rgba(170,68,255,${0.7+0.3*Math.sin(fr*.1)})`;cx.beginPath();cx.arc(0,-46,9,0,Math.PI*2);cx.fill();}
  cx.restore();
  // Ability FX
  if(pl.fxT>0){
    let prog=pl.fxT/22;
    if(selChar===0){cx.strokeStyle=`rgba(255,200,0,${prog})`;cx.lineWidth=5;cx.beginPath();cx.arc(0,-18,42*(1-prog*0.3),Math.PI*1.1,Math.PI*1.9);cx.stroke();}
    else if(selChar===2){cx.strokeStyle=`rgba(170,68,255,${prog})`;cx.lineWidth=4;cx.beginPath();cx.arc(0,-18,52*(1-prog),0,Math.PI*2);cx.stroke();}
  }
  if(pl.shield){cx.beginPath();cx.arc(0,-18,36,0,Math.PI*2);cx.strokeStyle=`rgba(170,68,255,${0.5+0.3*Math.sin(fr*.12)})`;cx.lineWidth=3;cx.stroke();}
  cx.restore();
}

// ===== HUD =====
let btns={};
function drawHUD(){
  cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,56);
  cx.fillStyle='#fff';cx.font='bold 14px Courier New';cx.textAlign='left';cx.fillText('SCORE:'+score,10,22);
  cx.fillStyle='#ffdd00';cx.fillText('GOLD:'+coins,10,42);
  cx.fillStyle='#aa88ff';cx.textAlign='center';cx.fillText('LV '+lv,W/2,22);
  let lp2=(score%450)/450;
  cx.fillStyle='#333';cx.fillRect(W/2-40,28,80,6);cx.fillStyle='#aa88ff';cx.fillRect(W/2-40,28,80*lp2,6);
  if(hi>0){cx.fillStyle='#445566';cx.font='11px Courier New';cx.textAlign='right';cx.fillText('BEST:'+hi,W-80,H-12);}
  // Ability btn
  let ch=CHARS[selChar];let ac=wcd/ch.cdMax;
  cx.fillStyle='rgba(0,0,0,0.6)';cx.beginPath();cx.arc(W-44,H-44,30,0,Math.PI*2);cx.fill();
  cx.strokeStyle=ac>0?'#555':'#aa88ff';cx.lineWidth=3;cx.beginPath();cx.arc(W-44,H-44,30,0,Math.PI*2);cx.stroke();
  if(ac>0){cx.fillStyle='rgba(0,0,0,0.6)';cx.beginPath();cx.moveTo(W-44,H-44);cx.arc(W-44,H-44,30,-Math.PI/2,-Math.PI/2+ac*Math.PI*2);cx.closePath();cx.fill();}
  cx.fillStyle=ac>0?'#666':'#fff';cx.font='9px Courier New';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(selChar===0?'SLASH':selChar===1?'SHOOT':'MAGIC',W-44,H-44);cx.textBaseline='alphabetic';
  btns.ability={x:W-74,y:H-74,w:60,h:60};
  // Pause
  cx.fillStyle='rgba(255,255,255,0.25)';cx.font='22px Arial';cx.textAlign='right';cx.fillText('⏸',W-8,52);
  btns.pause={x:W-50,y:8,w:42,h:46};
}

// ===== SCREENS =====
function drawMenu(){
  cx.fillStyle='#0a0520';cx.fillRect(0,0,W,H);
  for(let i=0;i<90;i++){cx.fillStyle=`rgba(255,255,255,${Math.random()*.6+.2})`;cx.fillRect((i*137+fr*.04)%W,(i*97)%H,1.5,1.5);}
  cx.shadowColor='#aa44ff';cx.shadowBlur=30;cx.fillStyle='#fff';cx.font=`bold ${Math.min(44,W*.1)}px Courier New`;cx.textAlign='center';
  cx.fillText('KNIGHT RUN',W/2,H*.18);cx.shadowBlur=0;
  cx.fillStyle='#7766aa';cx.font='13px Courier New';cx.fillText('Medieval Fantasy Runner',W/2,H*.25);
  btns.play=btn('▶  PLAY',W/2,H*.38,Math.min(220,W*.55),52,'#5533bb');
  btns.chars=btn('⚔  CHARACTERS',W/2,H*.5,Math.min(220,W*.55),46,'#333388');
  btns.themes=btn('🌍  WORLDS',W/2,H*.6,Math.min(220,W*.55),46,'#333388');
  btns.snd=btn(soundOn?'🔊 SOUND ON':'🔇 SOUND OFF',W/2,H*.7,Math.min(220,W*.55),44,soundOn?'#224422':'#442222');
  btns.mus=btn(musicOn?'🎵 MUSIC ON':'🎵 MUSIC OFF',W/2,H*.79,Math.min(220,W*.55),44,musicOn?'#224422':'#442222');
  cx.fillStyle='#33334a';cx.font='11px Courier New';cx.fillText('Swipe left/right • Tap to jump • Tap SLASH/SHOOT/MAGIC to attack',W/2,H*.9);
}

function drawCharSel(){
  cx.fillStyle='#0a0520';cx.fillRect(0,0,W,H);
  cx.fillStyle='#fff';cx.font='bold 22px Courier New';cx.textAlign='center';cx.fillText('CHOOSE YOUR HERO',W/2,44);
  CHARS.forEach((ch,i)=>{
    let y=H*.2+i*(H*.22);let sel=selChar===i;
    cx.fillStyle=sel?'#2a1a44':'#14121e';
    if(cx.roundRect){cx.beginPath();cx.roundRect(W*.08,y-44,W*.84,86,12);cx.fill();}
    else cx.fillRect(W*.08,y-44,W*.84,86);
    cx.strokeStyle=sel?'#aa44ff':'#33334a';cx.lineWidth=2;cx.stroke();
    // Mini char
    cx.save();cx.translate(W*.22,y+8);cx.scale(.55,.55);
    cx.fillStyle=ch.color;cx.fillRect(-15,-38,30,40);cx.fillStyle=ch.cape;
    cx.beginPath();cx.moveTo(-14,-35);cx.lineTo(-22,10);cx.lineTo(-10,5);cx.fill();
    cx.fillStyle=ch.color;cx.beginPath();cx.arc(0,-48,14,Math.PI,0);cx.fill();cx.fillRect(-14,-48,28,14);
    cx.fillStyle='#1a1a33';cx.fillRect(-9,-52,18,7);cx.restore();
    cx.fillStyle='#fff';cx.font='bold 17px Courier New';cx.textAlign='left';cx.fillText(ch.name,W*.35,y-14);
    cx.fillStyle='#aa88ff';cx.font='12px Courier New';cx.fillText('Ability: '+ch.desc,W*.35,y+6);
    if(sel){cx.fillStyle='#88ff88';cx.fillText('✓ Selected',W*.35,y+26);}
    btns['c'+i]={x:W*.08,y:y-44,w:W*.84,h:86};
  });
  btns.back=btn('← BACK',W/2,H*.9,160,44,'#333366');
}

function drawThemeSel(){
  cx.fillStyle='#0a0520';cx.fillRect(0,0,W,H);
  cx.fillStyle='#fff';cx.font='bold 22px Courier New';cx.textAlign='center';cx.fillText('CHOOSE WORLD',W/2,44);
  THEMES.forEach((t,i)=>{
    let col=i%2===0;let bx=col?W*.05:W*.52;let by=H*.16+~~(i/2)*(H*.26);
    let sel=selTheme===i;
    cx.fillStyle=t.road;
    if(cx.roundRect){cx.beginPath();cx.roundRect(bx,by,W*.43,H*.22,10);cx.fill();}
    else cx.fillRect(bx,by,W*.43,H*.22);
    cx.strokeStyle=sel?'#ffdd00':'#ffffff22';cx.lineWidth=2;cx.stroke();
    cx.fillStyle=t.sky;cx.fillRect(bx+2,by+2,W*.43-4,H*.22*.45-2);
    // Tiny road
    cx.fillStyle=t.fog+'88';cx.fillRect(bx+2,by+H*.22*.38,W*.43-4,8);
    cx.fillStyle='#fff';cx.font='bold 14px Courier New';cx.textAlign='center';
    cx.fillText(t.name,bx+W*.215,by+H*.22*.72);
    if(sel){cx.fillStyle='#ffdd00';cx.font='11px Courier New';cx.fillText('✓ Active',bx+W*.215,by+H*.22*.9);}
    btns['t'+i]={x:bx,y:by,w:W*.43,h:H*.22};
  });
  btns.back=btn('← BACK',W/2,H*.91,160,44,'#333366');
}

function drawPause(){
  cx.fillStyle='rgba(0,0,0,0.78)';cx.fillRect(0,0,W,H);
  cx.fillStyle='#fff';cx.font='bold 30px Courier New';cx.textAlign='center';cx.fillText('PAUSED',W/2,H*.28);
  btns.res=btn('▶ RESUME',W/2,H*.42,200,50,'#334422');
  btns.pmenu=btn('🏠 MAIN MENU',W/2,H*.54,200,50,'#332244');
  btns.psnd=btn(soundOn?'🔊 SOUND ON':'🔇 SOUND',W/2,H*.65,200,46,soundOn?'#224422':'#442222');
  btns.pmus=btn(musicOn?'🎵 MUSIC ON':'🎵 MUSIC OFF',W/2,H*.75,200,46,musicOn?'#224422':'#442222');
}

function drawOver(){
  cx.fillStyle='rgba(0,0,0,0.82)';cx.fillRect(0,0,W,H);
  cx.shadowColor='#ff2200';cx.shadowBlur=20;cx.fillStyle='#fff';cx.font='bold 34px Courier New';cx.textAlign='center';
  cx.fillText('GAME OVER',W/2,H*.25);cx.shadowBlur=0;
  cx.fillStyle='#ffcc00';cx.font='bold 20px Courier New';cx.fillText('SCORE: '+score,W/2,H*.36);
  cx.fillStyle='#ffdd00';cx.fillText('GOLD: '+coins,W/2,H*.44);
  cx.fillStyle='#aa88ff';cx.font='16px Courier New';cx.fillText('BEST: '+hi,W/2,H*.52);
  btns.res=btn('▶ PLAY AGAIN',W/2,H*.64,200,50,'#334422');
  btns.pmenu=btn('🏠 MAIN MENU',W/2,H*.76,200,50,'#332244');
}

// ===== DRAW MAIN =====
function draw(){
  cx.fillStyle='#0a0520';cx.fillRect(0,0,W,H);
  if(state==='menu'){drawMenu();return;}
  if(state==='charSel'){drawCharSel();return;}
  if(state==='themeSel'){drawThemeSel();return;}
  drawRoad();
  [...objs].sort((a,b)=>a.z-b.z).forEach(o=>{
    if(o.z<=0)return;
    if(o.type==='coin')drawCoin(o);
    else if(o.type==='barrel')drawBarrel(o);
    else if(o.type==='fire')drawFire(o);
    else if(o.type==='wall')drawWall(o);
    else if(o.type==='enemy')drawGoblin(o);
    else if(o.type==='arrow')drawArrow(o);
  });
  drawKnight();
  sparks.forEach(s=>{cx.save();cx.globalAlpha=s.l/s.ml;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=s.c;cx.fill();cx.restore();});
  drawHUD();
  if(state==='pause')drawPause();
  if(state==='over')drawOver();
}

// ===== INPUT =====
function tap(x,y){
  initAudio();
  if(state==='menu'){
    if(inB(btns.play,x,y))startGame();
    else if(inB(btns.chars,x,y))state='charSel';
    else if(inB(btns.themes,x,y))state='themeSel';
    else if(inB(btns.snd,x,y))soundOn=!soundOn;
    else if(inB(btns.mus,x,y)){musicOn=!musicOn;if(musicOn)startBGM();else stopBGM();}
  } else if(state==='charSel'){
    CHARS.forEach((_,i)=>{if(inB(btns['c'+i],x,y))selChar=i;});
    if(inB(btns.back,x,y))state='menu';
  } else if(state==='themeSel'){
    THEMES.forEach((_,i)=>{if(inB(btns['t'+i],x,y))selTheme=i;});
    if(inB(btns.back,x,y))state='menu';
  } else if(state==='play'){
    if(inB(btns.pause,x,y)){state='pause';stopBGM();}
    else if(inB(btns.ability,x,y))useAbility();
  } else if(state==='pause'||state==='over'){
    if(inB(btns.res,x,y)){if(state==='over')startGame();else{state='play';startBGM();}}
    if(inB(btns.pmenu,x,y)){state='menu';stopBGM();}
    if(inB(btns.psnd,x,y))soundOn=!soundOn;
    if(inB(btns.pmus,x,y)){musicOn=!musicOn;if(musicOn)startBGM();else stopBGM();}
  }
}

let tx=0,ty=0;
cv.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  let r=cv.getBoundingClientRect();
  tx=e.touches[0].clientX-r.left;ty=e.touches[0].clientY-r.top;
  tap(tx,ty);
},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();
  if(state!=='play')return;
  let r=cv.getBoundingClientRect();
  let dx=e.changedTouches[0].clientX-r.left-tx;
  let dy=e.changedTouches[0].clientY-r.top-ty;
  if(Math.abs(dx)<22&&Math.abs(dy)<22)jump();
  else if(Math.abs(dx)>Math.abs(dy))swLane(dx>0?1:-1);
  else if(dy<-25)jump();
},{passive:false});
cv.addEventListener('click',e=>{
  let r=cv.getBoundingClientRect();tap(e.clientX-r.left,e.clientY-r.top);
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')swLane(-1);
  else if(e.key==='ArrowRight')swLane(1);
  else if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();jump();}
  else if(e.key==='z'||e.key==='Z')useAbility();
  else if(e.key==='Escape'){if(state==='play'){state='pause';stopBGM();}else if(state==='pause'){state='play';startBGM();}}
  else if(state!=='play')startGame();
});

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
